<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Sign in · Elderly</title>
<meta name="robots" content="noindex">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700;800&display=swap" rel="stylesheet">
<script>try{document.documentElement.setAttribute('data-theme',localStorage.getItem('theme')||'light')}catch(e){document.documentElement.setAttribute('data-theme','light')}</script>
<style>
  :root{
    --ground:#EEF0EA;--surface:#FBFCF9;--surface-2:#F4F6F1;
    --ink:#16211C;--ink-soft:#3B4842;--muted:#67756C;--line:#DBDFD6;
    --rail:#173B31;--primary:#1D4A3E;--primary-ink:#F1ECDE;--accent:#E07E39;
    --crit:#C4553B;
    --font-sans:system-ui,-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    --font-display:"Plus Jakarta Sans",var(--font-sans);
  }
  :root[data-theme="dark"]{
    --ground:#0E1512;--surface:#16211C;--surface-2:#1B2A24;
    --ink:#EAE7DC;--ink-soft:#C3CCC4;--muted:#8C9A90;--line:#26362E;
    --rail:#0C1B16;--primary:#4FA587;--primary-ink:#0E1512;--accent:#EA8C4B;--crit:#E07B60;
  }
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;font-family:var(--font-sans);color:var(--ink);
    display:grid;place-items:center;padding:24px;
    background:radial-gradient(120% 90% at 50% -10%, #1f5344 0%, var(--rail) 55%, #0c211b 100%);
    -webkit-font-smoothing:antialiased;line-height:1.5}
  .card{width:100%;max-width:420px;background:var(--surface);border-radius:20px;
    box-shadow:0 30px 80px rgba(0,0,0,.35);border:1px solid var(--line);overflow:hidden}
  .head{padding:30px 34px 2px;text-align:center;position:relative}
  .brand{display:inline-flex;align-items:center;gap:11px;margin-bottom:16px}
  .brand svg{width:30px;height:30px}
  .brand .word{font-family:var(--font-display);font-weight:800;font-size:22px;letter-spacing:-.03em}
  .brand .word b{color:var(--accent)}
  h1{margin:0;font-family:var(--font-display);font-weight:800;font-size:20px;letter-spacing:-.02em}
  .sub{color:var(--muted);font-size:13.5px;margin:6px 0 0}
  .seg{display:flex;gap:6px;background:var(--surface-2);padding:5px;border-radius:12px;margin:20px 34px 0}
  .seg button{flex:1;border:0;background:transparent;color:var(--muted);font-weight:700;font-size:13.5px;
    font-family:var(--font-display);padding:9px;border-radius:8px;cursor:pointer;transition:.15s}
  .seg button[aria-selected="true"]{background:var(--surface);color:var(--ink);box-shadow:0 1px 3px rgba(20,40,32,.12)}
  .body{padding:22px 34px 30px}
  .field{margin-bottom:14px}
  .field label{display:block;font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:6px;
    text-transform:uppercase;letter-spacing:.05em}
  .field input{width:100%;padding:12px 13px;border:1px solid var(--line);background:var(--surface-2);
    color:var(--ink);border-radius:10px;font-size:14.5px;font-family:inherit;transition:.15s}
  .field input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 22%,transparent)}
  .btn{width:100%;border:0;background:var(--primary);color:var(--primary-ink);font-weight:700;font-size:15px;
    font-family:var(--font-display);padding:13px;border-radius:11px;cursor:pointer;transition:.15s;margin-top:4px}
  .btn:hover{filter:brightness(1.06)}
  .btn:active{transform:translateY(1px)}
  .err{color:var(--crit);font-size:13px;margin:0 0 12px;min-height:18px;font-weight:600}
  .switch{text-align:center;font-size:13px;color:var(--muted);margin:16px 0 0}
  .switch a{color:var(--primary);font-weight:700;text-decoration:none;cursor:pointer}
  .switch a:hover{text-decoration:underline}
  .note{text-align:center;font-size:12.5px;color:var(--muted);margin:15px 0 0}
  .done{text-align:center;padding:6px 2px}
  .done .ic{width:52px;height:52px;border-radius:50%;background:var(--primary);display:grid;place-items:center;margin:6px auto 16px}
  .done .ic svg{width:26px;height:26px;color:var(--primary-ink)}
  .done b{display:block;font-family:var(--font-display);font-size:18px;margin-bottom:8px}
  .done p{color:var(--muted);font-size:14px;margin:0}
  .foot{display:flex;align-items:center;justify-content:space-between;padding:15px 20px;border-top:1px solid var(--line)}
  .foot a{color:var(--muted);font-size:13px;font-weight:600;text-decoration:none;padding:6px 8px;border-radius:8px;transition:.15s}
  .foot a:hover{color:var(--ink)}
  .toprow{position:absolute;top:16px;right:16px;display:flex;gap:4px}
  .toprow button{background:none;border:0;color:var(--muted);cursor:pointer;padding:6px;border-radius:8px;
    font-family:inherit;font-size:12.5px;font-weight:700;display:grid;place-items:center}
  .toprow button:hover{color:var(--ink);background:var(--surface-2)}
  .toprow button svg{width:17px;height:17px}
  [hidden]{display:none!important}
</style>
</head>
<body>
  <div class="card">
    <div class="head">
      <div class="toprow">
        <button id="langBtn" title="Language">ES</button>
        <button id="themeBtn" aria-label="Theme"></button>
      </div>
      <div class="brand">
        <svg viewBox="0 0 48 48" aria-hidden="true"><circle cx="24" cy="24" r="22" fill="#1D4A3E"/><rect x="14" y="14.5" width="20" height="4.5" rx="2.25" fill="#F1ECDE"/><rect x="14" y="21.75" width="13" height="4.5" rx="2.25" fill="#E07E39"/><rect x="14" y="29" width="20" height="4.5" rx="2.25" fill="#F1ECDE"/></svg>
        <span class="word">Elder<b>ly</b></span>
      </div>
      <h1 id="title">Welcome</h1>
      <p class="sub" id="sub">Choose how to sign in</p>
    </div>

    <div class="seg" role="tablist">
      <button role="tab" aria-selected="true" data-tab="family" id="tabFamily">Families</button>
      <button role="tab" aria-selected="false" data-tab="team" id="tabTeam">Team</button>
    </div>

    <div class="body">
      <!-- ============ FAMILIES ============ -->
      <div data-pane="family">
        <div id="login">
          <p class="err" id="err1"></p>
          <div class="field"><label id="l-email">Email</label><input type="email" id="email" autocomplete="username"></div>
          <div class="field"><label id="l-pass">Password</label><input type="password" id="pass" autocomplete="current-password"></div>
          <button class="btn" id="loginBtn">Sign in</button>
          <p class="switch" id="sw1"></p>
        </div>
        <div id="signup" hidden>
          <p class="err" id="err2"></p>
          <div class="field"><label id="l-name">Your name</label><input type="text" id="suName"></div>
          <div class="field"><label id="l-email2">Email</label><input type="email" id="suEmail"></div>
          <div class="field"><label id="l-pass2">Password</label><input type="password" id="suPass"></div>
          <button class="btn" id="signupBtn">Create account</button>
          <p class="switch" id="sw2"></p>
        </div>
        <div id="done" class="done" hidden>
          <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12l5 5L20 6"/></svg></div>
          <b id="doneTitle">Thank you!</b>
          <p id="doneMsg"></p>
        </div>
      </div>

      <!-- ============ TEAM ============ -->
      <div data-pane="team" hidden>
        <p class="err" id="errT"></p>
        <div class="field"><label id="l-emailT">Email</label><input type="email" id="emailT" autocomplete="username"></div>
        <div class="field"><label id="l-passT">Password</label><input type="password" id="passT" autocomplete="current-password"></div>
        <button class="btn" id="teamBtn">Enter the panel</button>
        <p class="note" id="teamNote">Private access for the Elderly team only.</p>
      </div>
    </div>

    <div class="foot">
      <a href="/" id="backHome">← Back to home</a>
      <span style="font-size:12px;color:var(--muted)">Elderly</span>
    </div>
  </div>

<script>
(function(){
  var el=function(id){return document.getElementById(id)};
  var root=document.documentElement;
  var PORTAL_URL="https://claude.ai/code/artifact/7d466173-b5b2-4312-b4fa-b291fb4c74ac";

  /* accounts (solo hash, nunca texto plano) */
  var ACCOUNTS={
    "matias@heyzawo.com":"17cba007407bd75e21d906ebfe8726853582fab39e1f03dc9bd57a2b454b47c2",
    "pablo@heyzawo.com":"435b3265482ba13e8e83e2bab79724f04ee8e8edad9841d47d51e2bcbb0091f6",
    "belen@heyzawo.com":"952e1cce5a5f3bddc35fe0d965a2e6b7c284a320b8850a86d29e10dc01c21ff6"
  };
  function sha256hex(s){return crypto.subtle.digest("SHA-256",new TextEncoder().encode(s)).then(function(b){
    return Array.prototype.map.call(new Uint8Array(b),function(x){return x.toString(16).padStart(2,"0")}).join("")})}

  function setTheme(t){root.setAttribute('data-theme',t);try{localStorage.setItem('theme',t)}catch(e){}
    el('themeBtn').innerHTML=t==='dark'
      ?'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="4.5"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.4 1.4M17.6 17.6L19 19M19 5l-1.4 1.4M6.4 17.6L5 19"/></svg>'
      :'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z"/></svg>';}
  var t0='light';try{t0=localStorage.getItem('theme')||'light'}catch(e){}
  setTheme(t0);
  el('themeBtn').onclick=function(){setTheme(root.getAttribute('data-theme')==='dark'?'light':'dark')};

  var STR={
    en:{tabFamily:'Families',tabTeam:'Team',
      famTitle:'Welcome back',famSub:'Sign in to your family portal',
      suTitle:'Create your account',suSub:'Start bringing Elderly to your family',
      teamTitle:'Team portal',teamSub:'Sign in with your account',
      email:'Email',pass:'Password',login:'Sign in',name:'Your name',signup:'Create account',
      teamBtn:'Enter the panel',teamNote:'Private access for the Elderly team only.',
      sw1:'New here? <a id="toSignup">Create a free account</a>',
      sw2:'Already have an account? <a id="toLogin">Sign in</a>',
      doneTitle:'Thank you!',doneMsg:"We're getting Elderly ready for your family. We'll email you the moment your portal is live.",
      back:'← Back to home',needEmail:'Please enter your email.',needAll:'Please add your name and email.',
      noAccess:'This email is not on the team.',badPass:'Wrong password.',lang:'ES'},
    es:{tabFamily:'Familias',tabTeam:'Equipo',
      famTitle:'Hola de nuevo',famSub:'Ingresá al portal de tu familia',
      suTitle:'Creá tu cuenta',suSub:'Empezá a traer Elderly a tu familia',
      teamTitle:'Portal del equipo',teamSub:'Ingresá con tu cuenta',
      email:'Email',pass:'Contraseña',login:'Iniciar sesión',name:'Tu nombre',signup:'Crear cuenta',
      teamBtn:'Entrar al panel',teamNote:'Acceso privado, solo para el equipo de Elderly.',
      sw1:'¿Nuevo por acá? <a id="toSignup">Creá una cuenta gratis</a>',
      sw2:'¿Ya tenés cuenta? <a id="toLogin">Iniciá sesión</a>',
      doneTitle:'¡Gracias!',doneMsg:'Estamos preparando Elderly para tu familia. Te vamos a escribir apenas tu portal esté listo.',
      back:'← Volver al inicio',needEmail:'Poné tu email.',needAll:'Completá tu nombre y email.',
      noAccess:'Ese email no es del equipo.',badPass:'Contraseña incorrecta.',lang:'EN'}
  };
  var lang=(new URLSearchParams(location.search).get('lang')==='es')?'es':'en';
  var tab='family', famView='login';

  function s(){return STR[lang]}
  function applyLang(){
    root.setAttribute('lang',lang);
    document.title=(lang==='es'?'Ingresar':'Sign in')+' · Elderly';
    el('tabFamily').textContent=s().tabFamily; el('tabTeam').textContent=s().tabTeam;
    el('l-email').textContent=s().email; el('l-pass').textContent=s().pass; el('loginBtn').textContent=s().login;
    el('l-name').textContent=s().name; el('l-email2').textContent=s().email; el('l-pass2').textContent=s().pass; el('signupBtn').textContent=s().signup;
    el('l-emailT').textContent=s().email; el('l-passT').textContent=s().pass; el('teamBtn').textContent=s().teamBtn; el('teamNote').textContent=s().teamNote;
    el('sw1').innerHTML=s().sw1; el('sw2').innerHTML=s().sw2;
    el('doneTitle').textContent=s().doneTitle; el('doneMsg').textContent=s().doneMsg;
    el('backHome').textContent=s().back; el('backHome').setAttribute('href',lang==='es'?'/es':'/');
    el('langBtn').textContent=s().lang;
    bindSwitch(); syncTitle();
  }
  function bindSwitch(){
    var a=document.getElementById('toSignup'); if(a)a.onclick=function(e){e.preventDefault();famShow('signup')};
    var b=document.getElementById('toLogin'); if(b)b.onclick=function(e){e.preventDefault();famShow('login')};
  }
  function syncTitle(){
    if(tab==='team'){el('title').textContent=s().teamTitle;el('sub').textContent=s().teamSub;return}
    if(famView==='signup'){el('title').textContent=s().suTitle;el('sub').textContent=s().suSub;}
    else if(famView==='login'){el('title').textContent=s().famTitle;el('sub').textContent=s().famSub;}
    else{el('title').textContent='';el('sub').textContent='';}
  }
  function famShow(v){famView=v;
    el('login').hidden=v!=='login'; el('signup').hidden=v!=='signup'; el('done').hidden=v!=='done'; syncTitle();}
  function setTab(t){tab=t;
    document.querySelectorAll('.seg button').forEach(function(x){x.setAttribute('aria-selected',x.dataset.tab===t)});
    document.querySelectorAll('[data-pane]').forEach(function(p){p.hidden=p.dataset.pane!==t});
    if(t==='family')famShow('login'); else syncTitle();
  }
  document.querySelectorAll('.seg button').forEach(function(b){b.onclick=function(){setTab(b.dataset.tab)}});

  el('langBtn').onclick=function(){
    lang=lang==='es'?'en':'es';
    var u=new URL(location.href); if(lang==='es')u.searchParams.set('lang','es'); else u.searchParams.delete('lang');
    history.replaceState(null,'',u); applyLang();
  };
  el('loginBtn').onclick=function(){ if(!el('email').value.trim()){el('err1').textContent=s().needEmail;return} el('err1').textContent=''; famShow('done'); };
  el('signupBtn').onclick=function(){ if(!el('suName').value.trim()||!el('suEmail').value.trim()){el('err2').textContent=s().needAll;return} el('err2').textContent=''; famShow('done'); };
  el('teamBtn').onclick=function(){
    var m=el('emailT').value.trim().toLowerCase(), h=ACCOUNTS[m];
    if(!h){el('errT').textContent=s().noAccess;return}
    sha256hex(el('passT').value).then(function(x){
      if(x!==h){el('errT').textContent=s().badPass;return}
      el('errT').textContent=''; el('teamBtn').textContent='...'; location.href=PORTAL_URL;
    }).catch(function(){el('errT').textContent=s().badPass});
  };

  applyLang();
})();
</script>
</body>
</html>
